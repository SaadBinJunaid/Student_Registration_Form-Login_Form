<!DOCTYPE html>

    <title>Login Form</title>

<body style="background-color: #fdf6e3;">
    <h1 align="center"><strong><i>Login Form</i></strong></h1>
    <form align="center"><strong><i>
                <hr>
                <label for="UserName">UserName:</label>
                <input type="text" id="UserName" name="UserName" placeholder="Enter Your Full Name" required>
                <br>
                <br>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
                <hr>

                <input type="checkbox" id="remember" name="remember">
                <label for="remember">Remember Me</label>
                <br>
                <hr>

                <button type="submit"><strong><i>Login</i></strong></button>
                <span>/</span>
                <button type="reset"><strong><i>Reset</i></strong></button>
            </i>
        </strong>
    </form>
    <button type="button"><a href="/index.html"><strong><i>Go To Student Registration Form</i></strong></a></button>
</body>
