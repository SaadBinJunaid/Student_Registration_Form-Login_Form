<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
</head>

<body style="background-color: #fdf6e3;">
    <h1 align="center"><strong><i>Student Registration Form</i></strong></h1>
    <form align="center" action="Login Form/index.html"><strong><i>
                <hr>
                <label for="Name">Full Name:</label>
                <input type="text" id="Name" placeholder="Enter Your Full Name" required>
                <br>
                <br>

                <label for="Email">Email:</label>
                <input type="email" id="Email" placeholder="Enter Your Email" required>
                <br>
                <br>

                <label for="Password">Password:</label>
                <input type="password" id="Password" placeholder="Enter Your Password" required>
                <br>
                <br>

                <label for="Age">Age:</label>
                <input type="number" id="Age" placeholder="Enter Your Age" required>

                <br>
                <hr>
                <br>
                <label>Gender:</label>
                <input type="radio" id="Male" name="Gender" value="Male" required>
                <label for="Male">Male</label>

                <input type="radio" id="Female" name="Gender" value="Female" required>
                <label for="Female">Female</label>

                <br>
                <br>
                <hr>
                <label>Skills:</label>
                <input type="checkbox" id="Skills">
                <label for="Skills">JavaScript (ES6+)</label>

                <input type="checkbox" id="Skills">
                <label for="Skills">React.js</label>
                <br>
                <br>
                <input type="checkbox" id="Skills">
                <label for="Skills">Server-Side Rendering (SSR)</label>

                <input type="checkbox" id="Skills">
                <label for="Skills">API Development (REST APIs)</label>
                <br>
                <hr>
                <br>

                <label for="Date of Birth">Date of Birth</label>
                <input type="date" id="Date of Birth" placeholder="Enter Your Date of Birth" required>
                <hr>
                <br>

                <label for="Profile Picture">Profile Picture</label>
                <input type="file" id="Profile Picture" placeholder="Please Enter Your Profile Picture">
                <hr>
                <br>

                <button type="submit"><strong><i>Submit</i></strong></button>

            </i>
        </strong>
    </form>
</body>

</html>
